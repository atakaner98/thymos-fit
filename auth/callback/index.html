<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THYMOS Auth Callback</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-start: #0f172a;
        --bg-end: #111827;
        --card: rgba(15, 23, 42, 0.84);
        --line: rgba(148, 163, 184, 0.22);
        --text: #e5e7eb;
        --muted: #cbd5e1;
        --button: #f59e0b;
        --button-text: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background:
          radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 28%),
          linear-gradient(160deg, var(--bg-start), var(--bg-end));
        color: var(--text);
      }

      .card {
        width: min(100%, 460px);
        padding: 32px 24px;
        border-radius: 24px;
        border: 1px solid var(--line);
        background: var(--card);
        text-align: center;
        box-shadow: 0 24px 60px rgba(2, 6, 23, 0.45);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 1.9rem;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .spinner {
        width: 42px;
        height: 42px;
        margin: 24px auto;
        border-radius: 50%;
        border: 4px solid rgba(229, 231, 235, 0.18);
        border-top-color: var(--button);
        animation: spin 0.9s linear infinite;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 24px;
        padding: 14px 20px;
        border-radius: 999px;
        background: var(--button);
        color: var(--button-text);
        font-weight: 700;
        text-decoration: none;
      }

      .hint {
        margin-top: 14px;
        font-size: 0.95rem;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Opening THYMOS</h1>
      <div class="spinner" aria-hidden="true"></div>
      <p id="status">We are returning you to the app to finish authentication.</p>
      <a id="open-app" class="button" href="#">Open THYMOS</a>
      <p class="hint">If the app does not open automatically, tap the button above.</p>
    </main>
    <script>
      (function () {
        var status = document.getElementById("status");
        var button = document.getElementById("open-app");
        var params = window.location.search || "";
        var hash = window.location.hash || "";
        var appUrl = "thymos://auth/callback" + params + hash;

        button.href = appUrl;

        function updateStatus(message) {
          if (status) {
            status.textContent = message;
          }
        }

        function openApp() {
          updateStatus("Trying to open THYMOS...");
          window.location.replace(appUrl);
        }

        setTimeout(openApp, 150);
        setTimeout(function () {
          updateStatus("If THYMOS did not open yet, use the button below.");
        }, 1800);

        document.addEventListener("visibilitychange", function () {
          if (document.hidden) {
            updateStatus("THYMOS should be opening now.");
          }
        });
      })();
    </script>
  </body>
</html>
